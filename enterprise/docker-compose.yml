services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edu_postgres
    environment:
      POSTGRES_USER: edu_user
      POSTGRES_PASSWORD: edu_password
      POSTGRES_DB: edu_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: edu_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: edu_langfuse
    environment:
      DATABASE_URL: postgresql://edu_user:edu_password@postgres:5432/langfuse
      NEXTAUTH_SECRET: mysecret
      NEXTAUTH_URL: http://localhost:3000
      SALT: mysalt
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
