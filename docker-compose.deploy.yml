services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edu_postgres
    environment:
      POSTGRES_USER: edu_user
      POSTGRES_PASSWORD: edu_password
      POSTGRES_DB: edu_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./enterprise/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edu_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  python-api:
    build:
      context: ./enterprise
      dockerfile: Dockerfile
    container_name: edu_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://edu_user:edu_password@postgres:5432/edu_agent
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edu_frontend
    ports:
      - "80:80"
    depends_on:
      - python-api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
